# Example custom routes for `radix mock`.
#
# Run with:
#   radix mock examples/mock-routes.yml
#   radix mock --routes examples/mock-routes.yml --watch   # hot-reload on save
#
# Custom routes take precedence over the built-in httpbin-style endpoints.
# Templates use idiomatic Go text/template syntax: dot access for request data
# ({{.params.id}}, {{.query.q}}, {{.body.field}}, {{.method}}, {{.path}}) and
# function calls for generators. Headers whose names contain "-" need the index
# function, e.g. {{index .headers "Content-Type"}}.
#
# Generator functions:
#   {{uuid}}                          random v4 UUID
#   {{now}} / {{now "2006-01-02"}}    current UTC time (RFC3339, or a Go layout)
#   {{timestamp}}                     current Unix time (seconds)
#   {{random low high}}               random int in [low, high)
#   {{randomFloat min max}}           random float64 in [min, max)
#   {{randomChoice "a" "b" ...}}      one of the arguments at random
#   {{randomString n}}                n random alphanumeric characters
#   {{lorem n}}                       n random lorem-ipsum words
#   {{seq}}                           per-route counter from 1 (resets on reload)
#   {{hash "sha256" "text"}}          hex digest (sha256 | sha1 | md5)
#   {{faker.name}} / .email / .phone / .address   placeholder identity data
#   {{env "VAR"}}                     environment variable value
#   {{base64 "s"}}                    base64-encoded string

settings:
  # Global latency/chaos (CLI flags override these). Durations accept Go
  # duration strings ("200ms", "1s") or a bare number of seconds.
  latency: 0
  latency_jitter: 0
  fail_rate: 0
  fail_status: 500
  cors: false

  # What to do for requests that match neither a custom route nor a built-in
  # endpoint: "404" (default) or "proxy" (forward to proxy_target).
  fallback:
    type: "404"
    proxy_target: ""

routes:
  # Exact path + exact method, inline templated body.
  - path: /api/health
    method: GET
    response:
      status: 200
      headers:
        Content-Type: application/json
      body: '{"status":"ok"}'

  # Path parameters (:name) exposed via .params.
  - path: /api/users/:id
    method: GET
    response:
      status: 200
      headers:
        Content-Type: application/json
      body: |
        {
          "id": "{{.params.id}}",
          "name": "User {{.params.id}}",
          "email": "user{{.params.id}}@example.com"
        }

  # POST with request body + generator functions.
  - path: /api/users
    method: POST
    response:
      status: 201
      headers:
        Content-Type: application/json
      body: |
        {
          "id": "{{uuid}}",
          "name": "{{.body.name}}",
          "email": "{{.body.email}}",
          "created_at": "{{now}}"
        }

  # Generator showcase: fake user records with the full template-function set.
  # {{seq}} is a per-route counter (starts at 1, resets on --watch reload);
  # {{faker.*}} draws placeholder identity data; {{randomChoice}} / {{randomFloat}}
  # / {{lorem}} / {{hash}} round out the generators; {{now "..."}} takes a layout.
  - path: /api/fake/user
    method: GET
    response:
      status: 200
      headers:
        Content-Type: application/json
      body: |
        {
          "seq": {{seq}},
          "id": "{{uuid}}",
          "name": "{{faker.name}}",
          "email": "{{faker.email}}",
          "phone": "{{faker.phone}}",
          "address": "{{faker.address}}",
          "role": "{{randomChoice "admin" "editor" "viewer"}}",
          "score": {{randomFloat 0 100}},
          "bio": "{{lorem 8}}",
          "etag": "{{hash "sha256" "user"}}",
          "created_on": "{{now "2006-01-02"}}",
          "created_at": "{{now}}"
        }

  # Response body read from a file (path relative to this routes file's
  # directory). The file contents are templated too.
  - path: /api/products
    method: GET
    response:
      headers:
        Content-Type: application/json
      file: ./mocks/products.json

  # Multiple methods via `methods:`; .method/.path are available in templates.
  - path: /api/resource
    methods: [GET, POST, PUT, DELETE]
    response:
      status: 200
      body: '{"method":"{{.method}}","path":"{{.path}}"}'

  # Query parameter access.
  - path: /api/search
    method: GET
    response:
      status: 200
      body: '{"query":"{{.query.q}}","results":[]}'

  # Regex path matching (regex: prefix). Go regexp semantics: patterns are NOT
  # auto-anchored, so use ^...$ to match the whole path (as below); without the
  # anchors the pattern would match if found anywhere in the path.
  - path: "regex:^/api/v[0-9]+/users$"
    method: GET
    response:
      status: 200
      body: '{"users":[]}'

  # Trailing /* glob (prefix) match.
  - path: /assets/*
    response:
      status: 200
      body: 'asset for {{.path}}'

  # Per-route delay (fixed + jitter).
  - path: /api/slow
    method: GET
    delay: 2s
    delay_jitter: 500ms
    response:
      status: 200
      body: '{"message":"Finally!"}'

  # Conditional responses: the route picks its response by matching request
  # content. Arms are evaluated top to bottom; the FIRST arm whose every `match`
  # entry is satisfied wins. Match keys are dotted and prefixed with body.,
  # query., or headers.; a value of "*" means "present with any non-empty value"
  # and any other value is an exact match. body.<field> resolves a TOP-LEVEL,
  # SCALAR field of the parsed JSON object (or a form-urlencoded value); nested
  # paths (body.a.b) and object/array values are not meaningful match targets.
  # JSON numbers match their exact text (1000000, not 1e+06), booleans match
  # "true"/"false", and JSON null / "" both equal an exact "" (and are absent to
  # a "*" wildcard). The selected arm's body is templated as usual, reading the
  # same parsed body the match did.
  #
  # Every non-`default` arm must carry at least one `match` rule; use
  # `default: true` for an unconditional last arm.
  #
  # Precedence when serving: winning arm > `default: true` arm > the route's
  # top-level `response` (only if one was explicitly provided) > 404. A route
  # with no conditions and an absent/empty response serves 200 with an empty body.
  - path: /api/auth/login
    method: POST
    conditions:
      # Exact credentials -> issue a token.
      - match:
          body.username: admin
          body.password: secret
        response:
          status: 200
          headers: { Content-Type: application/json }
          body: '{"token":"{{uuid}}","user":"{{.body.username}}"}'
      # Any username present but credentials wrong -> 401.
      - match:
          body.username: "*"
        response:
          status: 401
          body: '{"error":"invalid credentials"}'
      # Nothing matched (e.g. username missing) -> 400.
      - default: true
        response:
          status: 400
          body: '{"error":"username is required"}'

  # Conditions can also branch on a query parameter or header; a top-level
  # `response` acts as the fallback when no arm matches.
  - path: /api/protected
    method: GET
    conditions:
      - match:
          headers.Authorization: "Bearer valid-token"
        response:
          status: 200
          body: '{"data":"secret"}'
    response:
      status: 401
      body: '{"error":"missing or invalid authorization"}'

  # Server-Sent Events: an `sse:` block streams a text/event-stream response of
  # scripted events instead of a single body (it replaces response/conditions for
  # the route). Each event may set:
  #   delay         wait before sending the event (Go duration or seconds)
  #   event         optional SSE event name (emitted as an `event:` line)
  #   data          templated payload (same data/funcs as a response body;
  #                 multi-line data becomes multiple `data:` lines on the wire)
  #   repeat        send the event this many times in total (default 1)
  #   repeat_delay  wait between successive repeats
  # The handler flushes after each event so clients receive them incrementally,
  # and returns promptly when the client disconnects.
  #
  # Try it with: curl -N http://localhost:8080/api/stream/42
  - path: /api/stream/:id
    method: GET
    sse:
      - event: open
        data: '{"status":"connected","id":"{{.params.id}}"}'
      - data: '{"seq":{{seq}},"ts":"{{now}}","value":{{randomFloat 0 100}}}'
        repeat: 5
        repeat_delay: 1s
      - event: close
        delay: 500ms
        data: '{"status":"done"}'
