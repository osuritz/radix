# Radix Configuration Example
# This file demonstrates all available configuration options

# Global settings
port: 8080
host: localhost
verbose: false      # verbose request logging (Extended CLF format)
no_color: false     # disable ANSI color in logs (also honored when output is not a TTY)

# TLS settings (applies to all commands when enabled)
tls:
  enabled: false
  cert: ./certs/cert.pem
  key: ./certs/key.pem
  ca: ./certs/ca.pem
  client_auth: false
  min_version: "1.3"  # "1.2" or "1.3"

# Metrics/Observability settings (applies to all server commands)
metrics:
  enabled: true
  path: /_metrics
  format: json  # "json" or "prometheus"

# Serve command configuration
serve:
  dir: ./public
  index: index.html
  spa: true
  cors: true
  gzip: true
  cache: "max-age=3600"
  # TLS-specific options (all require tls.enabled: true)
  hsts: false              # send Strict-Transport-Security header (HTTPS only)
  hsts_max_age: 31536000   # HSTS max-age in seconds (default 1 year)
  http_redirect: false     # run a plain-HTTP listener that 308-redirects to HTTPS
  http_port: 8080          # port for the redirect listener (must differ from `port`)

# Proxy command configuration
proxy:
  target: http://localhost:3000
  timeout: 30s
  websocket: true
  tls_skip_verify: false
  # Backend TLS settings
  backend_ca: ./certs/backend-ca.pem
  backend_cert: ./certs/client-cert.pem
  backend_key: ./certs/client-key.pem
  # Response flushing for streaming backends
  flush_interval: -1ns  # -1ns = flush immediately (best for SSE/streaming); 100ms = periodic; 0 = default buffering
  # Path manipulation
  rewrite: ""
  strip_prefix: ""
  # Headers to add/modify
  headers: []
  # CORS
  cors: false  # add permissive CORS headers to proxied responses
  # Auth extensions (HeaderProvider interface)
  # If a fork compiles in exactly one custom HeaderProvider (e.g., for Okta), it
  # is auto-detected and used — no config needed here. Otherwise the proxy falls
  # back to injecting the static `headers` above.
  # `auth.provider` selects among MULTIPLE registered providers by name (each
  # compiled in via RegisterHeaderProvider). A name that isn't registered is a
  # hard error, so misconfiguration fails fast instead of silently injecting no
  # headers. `auth.config` holds provider-specific settings and is read by the
  # provider itself; the built-in HeaderProvider interface does not consume it
  # yet, so for now it is reserved for forks that wire it into their own provider.
  # See IMPLEMENTATION_PLAN.md Section 15.
  # auth:
  #   provider: okta            # selects a registered provider by name
  #   config:                   # provider-specific settings (read by the provider)
  #     audience: "api.internal"

# Echo command configuration
echo:
  # Response control
  status: 200
  delay: 0
  delay_jitter: 0          # random jitter added to delay (e.g. 200ms)
  body: ""                 # non-empty returns this literal body instead of echo JSON
  content_type: application/json
  headers: []              # extra response headers, e.g. ["X-Echo-Server: Radix"]
  # Echo behavior — which request sections to include in the response
  echo_body: true
  echo_headers: true
  echo_query: true
  # Limits & formatting
  body_limit: 1048576      # max request body bytes (1MB); exceeding returns 413
  pretty: true             # indent the echo JSON
  # Path-based behavior
  status_from_path: false  # /404 or /status/500 sets the response status
  delay_from_path: false   # /delay/2 or /delay/500ms delays the response (capped at 10s)
  cors: false              # add permissive CORS headers to responses

# Mock command configuration
mock:
  # Built-in httpbin-style endpoints (/get, /post, /status/{code}, etc.)
  builtin: true            # register the built-in endpoints
  prefix: ""               # mount built-ins under a prefix, e.g. /_test -> /_test/get

  # Global behavior applied to every built-in response
  latency: "0"             # fixed artificial latency (e.g. 200ms, 1s)
  latency_jitter: "0"      # random jitter added to latency (e.g. 100ms)
  fail_rate: 0.0           # random failure rate, percentage 0-100
  fail_status: 500         # status code returned for random failures
  cors: false              # add permissive CORS headers to responses

  # Custom routes: a YAML file of routes that take precedence over the
  # built-ins (exact / :param / regex: / trailing /* glob paths, templated
  # bodies, per-route delays, and a 404 or proxy fallback). See
  # examples/mock-routes.yml for the full schema. Equivalent to the positional
  # `radix mock <file>` argument or the --routes/-r flag.
  routes: ./mocks/routes.yml
  # Hot-reload the routes file on change (--watch/-w). A broken edit is
  # rejected and the previous good config keeps serving.
  watch: false
