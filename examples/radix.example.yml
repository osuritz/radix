# Radix Configuration Example
# This file demonstrates all available configuration options

# Global settings
port: 8080
host: localhost
verbose: false

# TLS settings (applies to all commands when enabled)
tls:
  enabled: false
  cert: ./certs/cert.pem
  key: ./certs/key.pem
  ca: ./certs/ca.pem
  client_auth: false
  min_version: "1.3"  # "1.2" or "1.3"

# Metrics/Observability settings (applies to all server commands)
metrics:
  enabled: true
  path: /_metrics
  format: json  # "json" or "prometheus"

# Serve command configuration
serve:
  dir: ./public
  index: index.html
  spa: true
  cors: true
  gzip: true
  cache: "max-age=3600"
  # TLS-specific options
  http_redirect: false
  http_port: 8080
  hsts: false

# Proxy command configuration
proxy:
  target: http://localhost:3000
  timeout: 30s
  websocket: true
  tls_skip_verify: false
  # Backend TLS settings
  backend_ca: ./certs/backend-ca.pem
  backend_cert: ./certs/client-cert.pem
  backend_key: ./certs/client-key.pem
  # Response flushing for streaming backends
  flush_interval: -1ns  # -1ns = flush immediately (best for SSE/streaming); 100ms = periodic; 0 = default buffering
  # Path manipulation
  rewrite: ""
  strip_prefix: ""
  # Headers to add/modify
  headers: []
  # Auth extensions (HeaderProvider interface)
  # If a fork compiles in a custom HeaderProvider (e.g., for Okta), it is
  # used automatically — no config needed here. This section is only required
  # when multiple providers are registered or to pass provider-specific settings.
  # See IMPLEMENTATION_PLAN.md Section 15.
  # auth:
  #   provider: okta            # Only needed to disambiguate multiple providers
  #   config:                   # Optional provider-specific settings
  #     audience: "api.internal"

# Echo command configuration
echo:
  # Response control
  status: 200
  delay: 0
  delay_jitter: 0          # random jitter added to delay (e.g. 200ms)
  body: ""                 # non-empty returns this literal body instead of echo JSON
  content_type: application/json
  headers: []              # extra response headers, e.g. ["X-Echo-Server: Radix"]
  # Echo behavior — which request sections to include in the response
  echo_body: true
  echo_headers: true
  echo_query: true
  # Limits & formatting
  body_limit: 1048576      # max request body bytes (1MB); exceeding returns 413
  pretty: true             # indent the echo JSON
  # Path-based behavior
  status_from_path: false  # /404 or /status/500 sets the response status
  delay_from_path: false   # /delay/2 or /delay/500ms delays the response (capped at 10s)
  cors: false              # add permissive CORS headers to responses

# Mock command configuration
mock:
  # Built-in httpbin-style endpoints (/get, /post, /status/{code}, etc.)
  builtin: true            # register the built-in endpoints
  prefix: ""               # mount built-ins under a prefix, e.g. /_test -> /_test/get

  # Global behavior applied to every built-in response
  latency: "0"             # fixed artificial latency (e.g. 200ms, 1s)
  latency_jitter: "0"      # random jitter added to latency (e.g. 100ms)
  fail_rate: 0.0           # random failure rate, percentage 0-100
  fail_status: 500         # status code returned for random failures
  cors: false              # add permissive CORS headers to responses

  # Custom routes and hot-reload (reserved for a later release; currently unused)
  routes: ./mocks/routes.yml
  watch: false
