name: Docs

# Builds the VitePress documentation site from docs/ and deploys it to GitHub
# Pages. Pushes to main build and deploy; pull requests build only (validation,
# no deploy).
#
# Prerequisite: in the repository settings, Pages -> "Build and deployment" ->
# Source must be set to "GitHub Actions" for deploys to take effect.

on:
  push:
    branches: [main]
    # Only rebuild when docs sources or this workflow change.
    paths:
      - 'docs/**'
      - '.github/workflows/docs.yml'
  pull_request:
    branches: [main]
    paths:
      - 'docs/**'
      - '.github/workflows/docs.yml'

# Default to read-only at the workflow level. The build job (which runs on
# pull_request and executes PR-controlled npm scripts) inherits only this, so it
# never receives Pages-write or OIDC tokens. The elevated permissions needed to
# deploy are granted at the job level on `deploy` alone (see below).
permissions:
  contents: read

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: docs/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: docs

      - name: Build site
        run: npm run docs:build
        working-directory: docs

      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist

  deploy:
    name: Deploy
    # Deploy only on pushes to main; PRs build above for validation only.
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: build
    runs-on: ubuntu-latest
    # Elevated permissions are scoped to this job only (inherits contents: read).
    # pages: write publishes the artifact; id-token: write is required by
    # actions/deploy-pages for OIDC.
    permissions:
      pages: write
      id-token: write
    # Allow only one concurrent deployment; do not cancel an in-progress
    # production deploy (let it finish). Scoped here so PR validation builds do
    # not queue behind production deploys.
    concurrency:
      group: "pages"
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
